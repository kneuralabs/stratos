<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Stratos — Strategy Analyzer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --near-black:#050A20;--midnight:#0C1845;--sapphire:#1A44CC;
  --opal-1:#3A6FFF;--opal-2:#6B9BFF;--opal-3:#9DBDFF;--opal-4:#C4D8FF;
  --white:#FFFFFF;
  --bg:var(--near-black);--surface:var(--midnight);--surface2:#111D52;
  --border:rgba(58,111,255,.18);--border-bright:rgba(58,111,255,.4);
  --text:var(--white);--text-mid:var(--opal-3);
  --accent:var(--sapphire);--accent-bright:var(--opal-1);
  --green:#22C77A;--amber:#F5A623;--red:#FF5C7A;
  --r:14px;--r-sm:8px;
  --toggle-bg:rgba(255,255,255,.07);--toggle-border:rgba(255,255,255,.14);
  --glow-a:rgba(26,68,204,.22);--glow-b:rgba(58,111,255,.12);
  --logo-filter:none;
}
[data-theme="light"]{
  --bg:#F4F6FF;--surface:#FFFFFF;--surface2:#EBF0FF;
  --border:rgba(26,68,204,.12);--border-bright:rgba(26,68,204,.28);
  --text:#050A20;--text-mid:#3A5299;
  --toggle-bg:rgba(5,10,32,.06);--toggle-border:rgba(5,10,32,.12);
  --glow-a:rgba(26,68,204,.08);--glow-b:rgba(58,111,255,.06);
  --logo-filter:brightness(0) saturate(100%) invert(12%) sepia(90%) saturate(600%) hue-rotate(210deg);
  --opal-2:#1A44CC;--opal-3:#2255E0;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Calibri,Arial,sans-serif;
  font-weight:400;
  min-height:100vh;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  transition:background .3s,color .3s;
}

/* Ambient background glow */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 15% 0%,var(--glow-a) 0%,transparent 70%),
    radial-gradient(ellipse 40% 40% at 85% 100%,var(--glow-b) 0%,transparent 70%);
  pointer-events:none;z-index:0;
  transition:background .3s;
}

/* ── FLOATING THEME TOGGLE ── */
.theme-toggle{
  position:fixed;bottom:1.5rem;right:1.5rem;z-index:200;
  width:42px;height:42px;border-radius:50%;border:1px solid var(--toggle-border);
  background:var(--toggle-bg);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:border-color .2s,background .2s,box-shadow .2s,transform .15s;
  box-shadow:0 2px 16px rgba(0,0,0,.18);
  color:var(--text);
}
.theme-toggle:hover{
  border-color:var(--border-bright);
  box-shadow:0 4px 24px rgba(26,68,204,.2);
  transform:scale(1.08);
}
.theme-toggle svg{width:16px;height:16px;transition:opacity .2s,transform .3s}
.icon-moon,.icon-sun{position:absolute;transition:opacity .25s,transform .25s}
[data-theme="light"] .icon-moon{opacity:0;transform:rotate(90deg) scale(.6)}
[data-theme="light"] .icon-sun{opacity:1;transform:rotate(0)}
:root:not([data-theme="light"]) .icon-moon{opacity:1;transform:rotate(0)}
:root:not([data-theme="light"]) .icon-sun{opacity:0;transform:rotate(-90deg) scale(.6)}

.wrap{
  position:relative;
  z-index:1;
  max-width:900px;
  margin:0 auto;
  padding:3rem 1.5rem 5rem;
}

/* ── HEADER ── */
header{margin-bottom:3.5rem}

/* ── WORDMARK ── */
.wordmark{
  display:inline-flex;align-items:center;gap:.75rem;
}
.wordmark-logo-wrap{
  width:38px;height:38px;
  border-radius:10px;
  background:rgba(58,111,255,.13);
  border:1px solid var(--border-bright);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  flex-shrink:0;
  transition:background .3s,border-color .3s;
}
[data-theme="light"] .wordmark-logo-wrap{
  background:rgba(26,68,204,.08);
}
.wordmark-logo{
  width:28px;height:28px;
  object-fit:contain;
  filter:var(--logo-filter);
  transition:filter .3s;
}
.wordmark-text{
  font-size:1.6rem;font-weight:800;
  letter-spacing:-.03em;
  background:linear-gradient(120deg,var(--white) 30%,var(--opal-2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1;
}
[data-theme="light"] .wordmark-text{
  background:linear-gradient(120deg,var(--near-black) 30%,var(--sapphire));
  -webkit-background-clip:text;background-clip:text;
}

.hero{margin-top:2.5rem}
.hero h1{
  font-size:clamp(1.9rem,5vw,3rem);
  font-weight:300;
  letter-spacing:-.025em;
  line-height:1.12;
  color:var(--text);
}
.hero h1 em{
  font-style:normal;
  font-weight:700;
  background:linear-gradient(120deg,var(--opal-1),var(--opal-2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.hero p{margin-top:.8rem;font-size:.88rem;color:var(--text-mid);max-width:400px}

/* ── INPUT ── */
.input-section{margin-top:2rem}
.input-wrap{
  display:flex;
  border:1.5px solid var(--border-bright);
  border-radius:var(--r);
  overflow:hidden;
  background:var(--surface);
  transition:border-color .25s,box-shadow .25s;
}
.input-wrap:focus-within{
  border-color:var(--opal-1);
  box-shadow:0 0 0 3px rgba(58,111,255,.15),0 4px 24px rgba(26,68,204,.2);
}
.url-input{
  flex:1;
  border:none;
  padding:.9rem 1.1rem;
  font-family:Calibri,Arial,sans-serif;
  font-size:.9rem;
  color:var(--text);
  background:transparent;
  outline:none;
  min-width:0;
}
.url-input::placeholder{color:var(--opal-3);opacity:.5}
.analyze-btn{
  border:none;
  border-left:1.5px solid var(--border-bright);
  background:var(--sapphire);
  color:#fff;
  padding:.9rem 1.4rem;
  font-family:Calibri,Arial,sans-serif;
  font-size:.82rem;
  font-weight:700;
  letter-spacing:.06em;
  text-transform:uppercase;
  cursor:pointer;
  white-space:nowrap;
  transition:background .2s,box-shadow .2s;
  position:relative;
  overflow:hidden;
}
.analyze-btn::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.08) 50%,transparent 70%);
  transform:translateX(-100%);
  transition:transform .5s;
}
.analyze-btn:hover{background:var(--opal-1);box-shadow:0 0 20px rgba(58,111,255,.35)}
.analyze-btn:hover::after{transform:translateX(100%)}
.analyze-btn:disabled{opacity:.4;cursor:not-allowed}

/* ── LOADER OVERLAY ── */
#loaderOverlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(5,10,32,.94);
  backdrop-filter:blur(12px);
  z-index:100;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2rem;
}
#loaderOverlay.show{display:flex}
.loader-inner{width:290px;text-align:center}
.loader-wordmark{
  font-size:.72rem;font-weight:700;letter-spacing:.16em;
  text-transform:uppercase;color:#6B9BFF;margin-bottom:2.5rem;
}

/* Orbital scanner */
.scan-orbit{
  width:72px;height:72px;
  position:relative;
  margin:0 auto 2rem;
}
.scan-ring{
  position:absolute;inset:0;
  border-radius:50%;
  border:1.5px solid var(--border-bright);
}
.scan-ring:nth-child(1){animation:spinCW 3s linear infinite}
.scan-ring:nth-child(2){
  inset:8px;
  border-color:rgba(58,111,255,.35);
  animation:spinCCW 2s linear infinite;
}
.scan-core{
  position:absolute;
  inset:20px;
  border-radius:50%;
  background:radial-gradient(circle,var(--sapphire) 0%,transparent 70%);
  animation:corePulse 1.5s ease-in-out infinite alternate;
}
@keyframes spinCW{to{transform:rotate(360deg)}}
@keyframes spinCCW{to{transform:rotate(-360deg)}}
@keyframes corePulse{from{opacity:.5;transform:scale(.8)}to{opacity:1;transform:scale(1)}}

/* Dot on ring */
.scan-ring::after{
  content:'';
  position:absolute;
  top:-3px;left:50%;
  width:6px;height:6px;
  border-radius:50%;
  background:var(--opal-1);
  box-shadow:0 0 8px var(--opal-1);
  transform:translateX(-50%);
}

.steps-list{list-style:none;text-align:left;margin-bottom:1.5rem}
.steps-list li{
  display:flex;align-items:center;gap:.75rem;
  padding:.32rem 0;
  font-size:.78rem;
  color:#9DBDFF;
  transition:color .3s;
}
.steps-list li.active{color:#FFFFFF;font-weight:600}
.steps-list li.done{color:var(--green)}
.step-dot{
  width:7px;height:7px;border-radius:50%;
  border:1.5px solid currentColor;flex-shrink:0;
  position:relative;
}
.steps-list li.done .step-dot{background:var(--green);border-color:var(--green)}
.steps-list li.active .step-dot::after{
  content:'';position:absolute;inset:1px;
  border-radius:50%;background:var(--opal-1);
  animation:dotPulse .7s ease-in-out infinite alternate;
}
@keyframes dotPulse{from{transform:scale(.5)}to{transform:scale(1)}}

.loader-bar{height:2px;background:var(--surface2);border-radius:2px;overflow:hidden}
.loader-fill{height:100%;background:linear-gradient(90deg,var(--sapphire),var(--opal-1));width:0;transition:width .5s ease}

/* ── RESULTS ── */
#results{display:none;animation:slideUp .45s cubic-bezier(.22,1,.36,1) both}
#results.show{display:block}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.divider{height:1px;background:var(--border);margin:2rem 0}

/* ── COMPANY BRIEF ── */
.brief{margin-bottom:2.5rem}
.section-label{
  font-size:.65rem;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;
  color:var(--opal-2);margin-bottom:.9rem;
}
.brief-name{
  font-size:clamp(1.4rem,3.5vw,2.1rem);
  font-weight:300;letter-spacing:-.025em;margin-bottom:.5rem;
}
.brief-type{
  display:inline-block;
  font-size:.72rem;font-weight:700;
  border:1px solid var(--border-bright);
  border-radius:4px;padding:.15rem .65rem;
  margin-bottom:.9rem;letter-spacing:.06em;
  text-transform:uppercase;color:var(--opal-1);
  background:rgba(58,111,255,.08);
}
.brief-desc{font-size:.87rem;color:var(--text-mid);max-width:580px;line-height:1.75}

.score-row{display:flex;align-items:center;gap:1.5rem;margin-top:1.3rem;flex-wrap:wrap}
.score-chip{display:flex;align-items:baseline;gap:.35rem}
.score-big{
  font-size:2.6rem;font-weight:200;
  letter-spacing:-.05em;line-height:1;
  color:var(--accent);
}
[data-theme="light"] .score-big{color:var(--sapphire)}
.score-suffix{font-size:.78rem;color:var(--text-mid)}

/* ── PANELS GRID ── */
.grid-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1px;
  background:var(--border);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  margin-bottom:1px;
}
.panel{background:var(--surface);padding:1.5rem;transition:background .2s}
.panel-title{
  font-size:.65rem;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  color:var(--opal-2);margin-bottom:1.25rem;
}

/* ── BUSINESS MODEL ── */
.bm-infographic{display:flex;flex-direction:column;gap:1.1rem}
.bm-center{
  text-align:center;padding:.75rem;
  border:1.5px solid var(--border-bright);
  border-radius:var(--r-sm);
  position:relative;overflow:hidden;
  background:rgba(26,68,204,.08);
}
.bm-center::before{
  content:'';position:absolute;
  inset:0;
  background:radial-gradient(circle at 50% 50%,rgba(58,111,255,.08) 0%,transparent 70%);
  animation:bmGlow 3s ease-in-out infinite alternate;
}
@keyframes bmGlow{from{opacity:.5}to{opacity:1}}
.bm-center-label{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--opal-2);margin-bottom:.25rem}
.bm-center-type{font-size:.95rem;font-weight:700;color:var(--text)}

.bm-arrow{
  text-align:center;color:var(--text-mid);font-size:.67rem;
  display:flex;align-items:center;justify-content:center;gap:.4rem;
  letter-spacing:.06em;font-weight:600;text-transform:uppercase;
}
.bm-arrow::before,.bm-arrow::after{content:'';flex:1;height:1px;background:var(--border)}
.bm-streams{display:grid;grid-template-columns:1fr 1fr;gap:.45rem}
.bm-stream{
  padding:.55rem .7rem;
  background:rgba(58,111,255,.07);
  border:1px solid var(--border);
  border-radius:6px;
  font-size:.73rem;font-weight:500;
  color:var(--text-mid);
  animation:fadeScale .4s ease both;
}
[data-theme="light"] .bm-stream{background:rgba(26,68,204,.06);color:#1A3080}
@keyframes fadeScale{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.bm-moat-list{display:flex;flex-direction:column;gap:.3rem}
.bm-moat-item{
  display:flex;align-items:center;gap:.6rem;
  font-size:.73rem;color:var(--text-mid);
}
.bm-moat-item::before{content:'';width:16px;height:1.5px;background:var(--sapphire);flex-shrink:0}

/* ── COMPETITORS ── */
.comp-table{width:100%;border-collapse:collapse}
.comp-table td{padding:.55rem 0;vertical-align:top;font-size:.77rem;border-bottom:1px solid var(--border)}
.comp-table tr:last-child td{border-bottom:none}
.comp-name-cell{font-weight:600;color:var(--text);width:36%}
.comp-reason{color:var(--text-mid);font-size:.72rem;line-height:1.55}
.threat-badge{
  display:inline-block;font-size:.6rem;font-weight:700;
  padding:.1rem .45rem;border-radius:3px;
  letter-spacing:.06em;text-transform:uppercase;margin-top:.2rem;
}
.th{background:rgba(255,92,122,.12);color:var(--red);border:1px solid rgba(255,92,122,.25)}
.tm{background:rgba(245,166,35,.12);color:var(--amber);border:1px solid rgba(245,166,35,.25)}
.tl{background:rgba(34,199,122,.12);color:var(--green);border:1px solid rgba(34,199,122,.25)}

/* ── MARKETING GAPS ── */
.gap-bars{display:flex;flex-direction:column;gap:1rem}
.gap-item{display:flex;flex-direction:column;gap:.35rem}
.gap-label-row{display:flex;justify-content:space-between;font-size:.73rem}
.gap-label{color:var(--text)}
.gap-pct{color:var(--opal-2);font-weight:600}
.gap-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.gap-fill{height:100%;background:linear-gradient(90deg,var(--sapphire),var(--opal-1));border-radius:2px;width:0;transition:width 1.1s cubic-bezier(.22,1,.36,1)}

/* ── UX REVIEW ── */
.ux-grid{display:flex;flex-direction:column;gap:.4rem}
.ux-row{
  display:flex;align-items:flex-start;gap:.7rem;
  font-size:.77rem;padding:.4rem 0;
  border-bottom:1px solid var(--border);
}
.ux-row:last-child{border-bottom:none}
.ux-icon{width:16px;font-size:.7rem;flex-shrink:0;margin-top:.15rem}
.ux-text{color:var(--text-mid);line-height:1.55}
.ux-ok .ux-icon{color:var(--green)}
.ux-ok .ux-text{color:var(--green)}
.ux-warn .ux-icon{color:var(--red)}
.ux-warn .ux-text{color:var(--red)}

/* ── GROWTH TIMELINE ── */
.timeline{position:relative;padding-left:1.5rem}
.timeline::before{
  content:'';position:absolute;
  left:5px;top:10px;bottom:10px;
  width:1.5px;
  background:linear-gradient(to bottom,var(--sapphire),transparent);
}
.tl-item{
  position:relative;margin-bottom:1.5rem;
  opacity:0;transform:translateX(-10px);
  transition:opacity .4s ease,transform .4s ease;
}
.tl-item:last-child{margin-bottom:0}
.tl-item.visible{opacity:1;transform:translateX(0)}
.tl-dot{
  position:absolute;left:-1.5rem;top:5px;
  width:11px;height:11px;border-radius:50%;
  border:2px solid var(--sapphire);
  background:var(--bg);
  transition:background .3s,box-shadow .3s;
}
.tl-item.visible .tl-dot{
  background:var(--sapphire);
  box-shadow:0 0 10px rgba(26,68,204,.5);
}
.tl-horizon{
  font-size:.63rem;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--opal-2);margin-bottom:.2rem;
}
.tl-opp{font-size:.8rem;font-weight:600;color:var(--text);margin-bottom:.15rem}
.tl-detail{font-size:.72rem;color:var(--text-mid);line-height:1.6}

/* ── SINGLE WIDE ROW ── */
.single-row{
  background:var(--border);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  margin-bottom:1px;
}
.single-row .panel{border-radius:0}

/* ── FOOTER ── */
.foot{
  margin-top:3rem;padding-top:1.5rem;
  border-top:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:.5rem;
}
.foot-label{font-size:.7rem;color:var(--text-mid)}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .wrap{padding:1.5rem 1rem 4rem}
  .grid-row{grid-template-columns:1fr}
  .bm-streams{grid-template-columns:1fr}
  .foot{flex-direction:column;text-align:center}
  .hero h1{font-size:1.7rem}
}
@media(min-width:641px) and (max-width:900px){
  .wrap{padding:2rem 1.25rem 4.5rem}
}
</style>
</head>
<body>
<div class="wrap">

<!-- FLOATING THEME TOGGLE -->
<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme" title="Toggle dark/light">
  <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/>
  </svg>
  <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="5"/>
    <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </svg>
</button>

<header>
  <div class="wordmark">
    <div class="wordmark-logo-wrap">
      <img class="wordmark-logo" src="https://github.com/kneuralabs/stratos/blob/main/LOGO.png?raw=true" alt="Stratos logo" onerror="this.parentElement.style.display='none'"/>
    </div>
    <span class="wordmark-text">Stratos</span>
  </div>
  <div class="hero">
    <h1>Decode any website's<br><em>strategy</em> in seconds.</h1>
    <p>Enter a URL. Get a full business intelligence report — model, gaps, growth, and UX.</p>
  </div>
  <div class="input-section">
    <div class="input-wrap">
      <input class="url-input" id="urlInput" type="url" placeholder="https://notion.so" autocomplete="off"/>
      <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">Analyse →</button>
    </div>
  </div>
</header>

<div id="loaderOverlay">
  <div class="loader-inner">
    <div class="loader-wordmark">Stratos · Analysing</div>
    <div class="scan-orbit">
      <div class="scan-ring"></div>
      <div class="scan-ring"></div>
      <div class="scan-core"></div>
    </div>
    <ul class="steps-list" id="stepsList">
      <li data-s="0"><span class="step-dot"></span>Fetching site structure</li>
      <li data-s="1"><span class="step-dot"></span>Mapping business model</li>
      <li data-s="2"><span class="step-dot"></span>Identifying competitors</li>
      <li data-s="3"><span class="step-dot"></span>Auditing UX & gaps</li>
      <li data-s="4"><span class="step-dot"></span>Generating strategy report</li>
    </ul>
    <div class="loader-bar"><div class="loader-fill" id="loaderFill"></div></div>
  </div>
</div>

<div id="results"></div>

</div>

<script>
const API_KEY='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';
let stepTimer,currentStep=0;

function startLoader(){
  document.getElementById('loaderOverlay').className='show';
  currentStep=0;updateStep(0);
  stepTimer=setInterval(()=>{
    currentStep=Math.min(currentStep+1,4);
    updateStep(currentStep);
  },1800);
}
function updateStep(n){
  document.querySelectorAll('#stepsList li').forEach((li,i)=>{
    li.className=i<n?'done':i===n?'active':'';
  });
  document.getElementById('loaderFill').style.width=(n/4*90)+'%';
}
function stopLoader(){
  clearInterval(stepTimer);
  document.querySelectorAll('#stepsList li').forEach(li=>li.className='done');
  document.getElementById('loaderFill').style.width='100%';
  setTimeout(()=>{document.getElementById('loaderOverlay').className='';},400);
}

function buildPrompt(url){
  return `You are a strategic business analyst with deep knowledge of global companies. Analyse "${url}" and return a JSON object. Use your training knowledge about this company — do NOT say you cannot access URLs.

Return ONLY this exact JSON structure, filled with real data:
{"siteName":"Company Name","modelType":"SaaS","score":78,"brief":"Sentence 1. Sentence 2. Sentence 3.","businessModel":{"type":"Professional Services","revenue":["IT Services","Consulting","BPO"],"moat":["Scale","Client lock-in"]},"competitors":[{"name":"Accenture","threat":"High","reason":"Overlapping services and global reach"},{"name":"Infosys","threat":"High","reason":"Similar offshore model"},{"name":"Capgemini","threat":"Medium","reason":"European focus"}],"marketingGaps":[{"channel":"SEO","coverage":45},{"channel":"Social","coverage":60},{"channel":"Email","coverage":70},{"channel":"Paid","coverage":35}],"uxReview":{"score":72,"strengths":["Clear service navigation","Strong case studies"],"issues":["Slow load times","Generic messaging","Poor mobile experience"]},"growth":[{"horizon":"Short-term","opportunity":"AI Integration Services","detail":"Package existing consulting into AI-readiness offerings for enterprise clients."},{"horizon":"Mid-term","opportunity":"Platform Productization","detail":"Convert bespoke client solutions into scalable SaaS products."},{"horizon":"Long-term","opportunity":"Autonomous Operations","detail":"Build fully automated managed services powered by proprietary AI stack."}]}

Fill in ALL fields with accurate, specific data about the actual company at that URL. No placeholders, no empty strings.`;
}

function renderResults(url,r){
  const domain=url.replace(/https?:\/\/(www\.)?/,'').split('/')[0]||url;
  const score=r.score||72;
  const bm=r.businessModel||{};
  const comps=r.competitors||[];
  const gaps=r.marketingGaps||[];
  const ux=r.uxReview||{};
  const growth=r.growth||[];

  const compHtml=comps.map(c=>{
    const tc=c.threat==='High'?'th':c.threat==='Medium'?'tm':'tl';
    return `<tr>
      <td class="comp-name-cell">${c.name}<br><span class="threat-badge ${tc}">${c.threat}</span></td>
      <td class="comp-reason">${c.reason}</td>
    </tr>`;
  }).join('');

  const gapHtml=gaps.map((g,i)=>`
    <div class="gap-item">
      <div class="gap-label-row"><span class="gap-label">${g.channel}</span><span class="gap-pct">${g.coverage}%</span></div>
      <div class="gap-track"><div class="gap-fill" data-w="${g.coverage}" style="transition-delay:${i*.14}s"></div></div>
    </div>`).join('');

  const uxHtml=[
    ...(ux.strengths||[]).map(s=>`<div class="ux-row ux-ok"><span class="ux-icon">↑</span><span class="ux-text">${s}</span></div>`),
    ...(ux.issues||[]).map(i=>`<div class="ux-row ux-warn"><span class="ux-icon">!</span><span class="ux-text">${i}</span></div>`)
  ].join('');

  const streamHtml=(bm.revenue||[]).map((s,i)=>`<div class="bm-stream" style="animation-delay:${i*.1+.2}s">${s}</div>`).join('');
  const moatHtml=(bm.moat||[]).map(m=>`<div class="bm-moat-item">${m}</div>`).join('');

  const tlHtml=(growth).map((g,i)=>`
    <div class="tl-item" style="transition-delay:${i*.15}s">
      <div class="tl-dot"></div>
      <div class="tl-horizon">${g.horizon}</div>
      <div class="tl-opp">${g.opportunity}</div>
      <div class="tl-detail">${g.detail}</div>
    </div>`).join('');

  document.getElementById('results').innerHTML=`
  <div class="brief">
    <div class="section-label">Company Overview</div>
    <div class="brief-name">${r.siteName||domain}</div>
    <span class="brief-type">${r.modelType||bm.type||'Platform'}</span>
    <div class="brief-desc">${r.brief||'A technology company.'}</div>
    <div class="score-row">
      <div class="score-chip">
        <span class="score-big">${score}</span>
        <span class="score-suffix">/ 100</span>
      </div>
      <span style="font-size:.75rem;color:var(--text-mid)">Strategy Score</span>
    </div>
  </div>
  <div class="divider"></div>
  <div class="grid-row" style="margin-bottom:1px">
    <div class="panel">
      <div class="panel-title">Business Model</div>
      <div class="bm-infographic">
        <div class="bm-center">
          <div class="bm-center-label">Core Model</div>
          <div class="bm-center-type">${bm.type||r.modelType||'Platform'}</div>
        </div>
        <div class="bm-arrow">Revenue Streams</div>
        <div class="bm-streams">${streamHtml}</div>
        ${bm.moat?`<div class="bm-arrow">Moat</div><div class="bm-moat-list">${moatHtml}</div>`:''}
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">Competitors</div>
      <table class="comp-table"><tbody>${compHtml}</tbody></table>
    </div>
  </div>
  <div class="grid-row" style="margin-bottom:1px">
    <div class="panel">
      <div class="panel-title">Marketing Gaps</div>
      <div class="gap-bars">${gapHtml}</div>
    </div>
    <div class="panel">
      <div class="panel-title">UX Review — ${ux.score||'—'}/100</div>
      <div class="ux-grid">${uxHtml}</div>
    </div>
  </div>
  <div class="single-row">
    <div class="panel">
      <div class="panel-title">Growth Opportunities</div>
      <div class="timeline">${tlHtml}</div>
    </div>
  </div>
  <div class="foot">
    <span class="foot-label">Analysed: ${domain}</span>
    <span class="foot-label">Stratos · Powered by Claude</span>
  </div>`;

  document.getElementById('results').className='show';

  requestAnimationFrame(()=>{
    setTimeout(()=>{
      document.querySelectorAll('.gap-fill').forEach(b=>{b.style.width=b.dataset.w+'%'});
      document.querySelectorAll('.tl-item').forEach((el,i)=>{
        setTimeout(()=>el.classList.add('visible'),i*180+80);
      });
    },120);
  });
}

async function analyze(){
  let url=document.getElementById('urlInput').value.trim();
  if(!url){
    const inp=document.getElementById('urlInput');
    inp.style.outline='2px solid var(--red)';
    setTimeout(()=>inp.style.outline='',1500);
    return;
  }
  // Auto-prepend https:// if missing
  if(!/^https?:\/\//i.test(url)) url='https://'+url;

  document.getElementById('analyzeBtn').disabled=true;
  document.getElementById('results').className='';
  document.getElementById('results').innerHTML='';
  startLoader();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':API_KEY,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:2048,
        system:'You are a strategic business analyst. Return ONLY valid JSON with no markdown fences, no preamble, no explanation. Start your response with { and end with }.',
        messages:[{role:'user',content:buildPrompt(url)}]
      })
    });
    const data=await res.json();
    if(data.error){throw new Error(data.error.message||'API error')}
    const text=(data.content?.[0]?.text||'').trim();
    if(!text){throw new Error('Empty response from API')}
    // Extract JSON robustly — strip any accidental markdown
    const jsonStr=text.replace(/^```json\s*/,'').replace(/```\s*$/,'').trim();
    let r;
    try{r=JSON.parse(jsonStr);}
    catch(pe){
      // Try extracting first {...} block
      const m=jsonStr.match(/\{[\s\S]*\}/);
      if(m)r=JSON.parse(m[0]);
      else throw new Error('Could not parse response: '+jsonStr.slice(0,120));
    }
    stopLoader();
    setTimeout(()=>renderResults(url,r),420);
  }catch(e){
    stopLoader();
    const el=document.getElementById('results');
    el.innerHTML=`<div style="color:var(--red);font-size:.85rem;padding:1rem 0;line-height:1.6">
      <strong>Error:</strong> ${e.message}<br>
      <span style="color:var(--text-mid);font-size:.75rem">Check the browser console for details.</span>
    </div>`;
    el.className='show';
    console.error('Stratos error:',e);
  }
  document.getElementById('analyzeBtn').disabled=false;
}

document.getElementById('urlInput').addEventListener('keydown',e=>{if(e.key==='Enter')analyze()});

// Theme toggle
const html=document.documentElement;
document.getElementById('themeToggle').addEventListener('click',()=>{
  html.dataset.theme=html.dataset.theme==='light'?'':'light';
});
</script>
